<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>화학 평형 탐구</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb; --blue-dark: #1d4ed8; --blue-light: #eff6ff; --blue-border: #bfdbfe;
      --teal: #0f766e; --teal-dark: #0d6b63; --teal-light: #f0fdfa; --teal-border: #99f6e4;
      --red: #dc2626; --red-light: #fef2f2;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-400: #94a3b8; --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--gray-50); color: var(--gray-900); min-height: 100vh; font-size: 16px;
    }

    /* ── HEADER ── */
    .page-header {
      color: white; padding: 14px 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .page-header.blue { background: var(--blue); }
    .page-header.teal { background: var(--teal); }
    .page-header-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-header h1 { font-size: 1rem; font-weight: 600; }
    .tag { background: rgba(255,255,255,0.22); padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
    .section { margin-bottom: 28px; }
    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--gray-500); margin-bottom: 10px;
    }
    .divider { border: none; border-top: 1px solid var(--gray-200); margin: 24px 0; }

    /* ── TEACHER: REACTION CARDS ── */
    .reaction-card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; margin-bottom: 10px; }
    .reaction-card-body { padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; }
    .reaction-index {
      width: 24px; height: 24px; background: var(--blue-light); color: var(--blue);
      border-radius: 6px; font-size: 0.76rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .reaction-info { flex: 1; min-width: 0; }
    .reaction-equation { font-size: 0.95rem; font-weight: 600; margin-bottom: 5px; line-height: 1.5; }
    .reaction-meta { font-size: 0.78rem; color: var(--gray-500); }
    .reaction-meta strong { color: var(--gray-700); }
    .reaction-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 10px 18px; border-radius: 8px; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; border: none; transition: background 0.12s, opacity 0.12s;
      min-height: 44px; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-teal { background: var(--teal); color: white; }
    .btn-teal:hover { background: var(--teal-dark); }
    .btn-ghost { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-700); }
    .btn-ghost:hover { background: var(--gray-100); }
    .btn-danger-ghost { background: transparent; border: 1px solid transparent; color: var(--red); }
    .btn-danger-ghost:hover { background: var(--red-light); border-color: #fca5a5; }
    .btn-sm { padding: 7px 14px; min-height: 36px; font-size: 0.82rem; }
    .btn-full { width: 100%; }

    .btn-icon {
      width: 36px; height: 36px; padding: 0; border-radius: 8px;
      background: var(--gray-100); border: none; color: var(--gray-700);
      cursor: pointer; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:hover { background: var(--gray-200); }
    .btn-icon.danger { color: var(--red); }
    .btn-icon.danger:hover { background: var(--red-light); }
    .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    @media (min-width: 640px) { .modal-backdrop { align-items: center; padding: 20px; } }
    .modal {
      background: white; width: 100%; max-width: 620px;
      border-radius: 20px 20px 0 0; max-height: 92vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (min-width: 640px) { .modal { border-radius: 16px; max-height: 88vh; } }
    .modal-header {
      padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; background: white; z-index: 1;
    }
    .modal-title { font-size: 1.05rem; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--gray-200); display: flex; gap: 8px; justify-content: flex-end; }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--gray-500); margin-bottom: 5px; }
    .form-input, .form-select {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 1rem; color: var(--gray-900); background: white;
      -webkit-appearance: none; appearance: none; transition: border-color 0.12s;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 8px center; background-size: 20px; padding-right: 32px;
    }
    .form-row { display: flex; gap: 10px; }
    .form-row > .form-group { flex: 1; }
    .form-hint { font-size: 0.75rem; color: var(--gray-400); margin-top: 5px; }

    /* ── SUBSTANCE EDITOR ── */
    .substances-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .substances-label { font-size: 0.82rem; font-weight: 600; color: var(--gray-500); }
    .substance-row { display: flex; gap: 6px; align-items: center; margin-bottom: 7px; }
    .substance-row .form-input, .substance-row .form-select { padding: 8px 10px; font-size: 0.9rem; }
    .substance-row .form-select { background-position: right 4px center; padding-right: 22px; }
    .sub-coeff { width: 52px; flex-shrink: 0; text-align: center; }
    .sub-formula { flex: 1; min-width: 60px; }
    .sub-state { width: 64px; flex-shrink: 0; }
    .sub-fixed { width: 78px; flex-shrink: 0; }

    /* ── EQUATION PREVIEW ── */
    .eq-preview {
      background: var(--blue-light); border: 1px solid var(--blue-border);
      border-radius: 8px; padding: 10px 14px; font-size: 0.95rem; font-weight: 600;
      text-align: center; color: var(--blue-dark); margin-bottom: 18px; min-height: 40px; line-height: 1.6;
    }
    .eq-preview.teal { background: var(--teal-light); border-color: var(--teal-border); color: var(--teal); }

    /* ── LINK BOX ── */
    .link-box {
      background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 12px; font-family: monospace; font-size: 0.73rem;
      word-break: break-all; color: var(--gray-500); margin-top: 8px; user-select: all;
    }
    .link-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* ── STUDENT: INPUTS ── */
    .s-inputs-grid { display: flex; flex-direction: column; gap: 8px; }
    .s-input-row { display: flex; align-items: center; gap: 10px; }
    .s-input-label { min-width: 120px; font-size: 0.92rem; font-weight: 600; flex-shrink: 0; }
    .s-input-row .form-input { flex: 1; font-size: 1rem; }
    .s-unit { font-size: 0.82rem; color: var(--gray-500); flex-shrink: 0; }

    /* ── STUDENT: TABLE ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid var(--gray-200); }
    table.result-table { border-collapse: collapse; white-space: nowrap; font-size: 0.82rem; width: 100%; }
    .result-table th, .result-table td {
      border: 1px solid var(--gray-200); padding: 7px 10px; text-align: center;
    }
    .result-table thead th { background: var(--gray-100); font-weight: 600; font-size: 0.78rem; line-height: 1.4; }
    .result-table thead th.group-header { background: var(--teal-light); color: var(--teal); font-size: 0.75rem; }
    .result-table td.label-cell { background: var(--gray-50); font-weight: 600; font-size: 0.8rem; white-space: nowrap; }
    .result-table td.fixed-cell { color: var(--gray-400); font-style: italic; }
    .result-table td.formula-cell { font-weight: 600; color: var(--teal-dark); }
    .result-table tbody tr:hover td { background: #f8fffd; }

    /* ── FRACTION DISPLAY ── */
    .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1.3; font-size: 0.85em; }
    .fn { border-bottom: 1px solid currentColor; padding: 0 3px 2px; }
    .fd { padding: 2px 3px 0; }

    /* ── REACTION TABS ── */
    .reaction-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .tab-btn {
      padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--gray-200);
      background: white; color: var(--gray-700); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; min-height: 40px; -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
    }
    .tab-btn:hover { background: var(--gray-100); }
    .tab-btn.active { background: var(--teal); color: white; border-color: var(--teal); }

    /* ── MISC ── */
    .empty-state {
      text-align: center; padding: 32px 16px; color: var(--gray-400); font-size: 0.9rem;
      border: 1.5px dashed var(--gray-200); border-radius: 12px;
    }
    .hidden { display: none !important; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--gray-900); color: white; padding: 10px 20px; border-radius: 20px;
      font-size: 0.85rem; z-index: 999; pointer-events: none; opacity: 0;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .s-input-label { min-width: 90px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div id="teacher-page" class="hidden">

<script>
// ══════════════════════════════════════════════
// 기본 반응 데이터
// ══════════════════════════════════════════════

let reactions = [
  {
    id: 'r1', temperature: 25, K: 215,
    reactants: [{ id:'s1', formula:'NO2',  coefficient:2, state:'g',  fixedConc:null }],
    products:  [{ id:'s2', formula:'N2O4', coefficient:1, state:'g',  fixedConc:null }]
  },
  {
    id: 'r2', temperature: 425, K: 54.3,
    reactants: [
      { id:'s3', formula:'H2', coefficient:1, state:'g', fixedConc:null },
      { id:'s4', formula:'I2', coefficient:1, state:'g', fixedConc:null }
    ],
    products: [{ id:'s5', formula:'HI', coefficient:2, state:'g', fixedConc:null }]
  },
  {
    id: 'r3', temperature: 500, K: 0.040,
    reactants: [
      { id:'s6', formula:'N2', coefficient:1, state:'g', fixedConc:null },
      { id:'s7', formula:'H2', coefficient:3, state:'g', fixedConc:null }
    ],
    products: [{ id:'s8', formula:'NH3', coefficient:2, state:'g', fixedConc:null }]
  },
  {
    id: 'r4', temperature: 25, K: 1.8e-5,
    reactants: [
      { id:'s9',  formula:'CH3COOH', coefficient:1, state:'aq', fixedConc:null },
      { id:'s10', formula:'H2O',     coefficient:1, state:'l',  fixedConc:55.5 }
    ],
    products: [
      { id:'s11', formula:'CH3COO-', coefficient:1, state:'aq', fixedConc:null },
      { id:'s12', formula:'H3O+',    coefficient:1, state:'aq', fixedConc:null }
    ]
  }
];

// ══════════════════════════════════════════════
// 공통 유틸리티
// ══════════════════════════════════════════════

function formatFormula(formula) {
  if (!formula) return '';
  const chargeMatch = formula.match(/(\d*[+\-]+)$/);
  let base = formula, charge = '';
  if (chargeMatch) { charge = chargeMatch[0]; base = formula.slice(0, formula.length - charge.length); }
  let result = base.replace(/(\d+)/g, '<sub>$1</sub>');
  if (charge) result += '<sup>' + charge + '</sup>';
  return result;
}

function buildEquationHtml(r) {
  if (!r?.reactants || !r?.products) return '—';
  const side = (subs) => subs.filter(s => s.formula.trim()).map(s => {
    const coeff = s.coefficient === 1 ? '' : s.coefficient;
    const st = `<span style="font-size:0.78em;color:var(--gray-500)">(${s.state})</span>`;
    return `${coeff}${formatFormula(s.formula)}${st}`;
  }).join(' + ');
  const L = side(r.reactants), R = side(r.products);
  if (!L && !R) return '—';
  return `${L || '?'} ⇌ ${R || '?'}`;
}

function formatKHtml(k) {
  if (k == null || isNaN(k)) return '?';
  if (k === 0) return '0';
  const abs = Math.abs(k);
  if (abs >= 0.001 && abs < 100000) return parseFloat(k.toPrecision(4)).toString();
  const e = Math.floor(Math.log10(abs));
  const m = parseFloat((k / Math.pow(10, e)).toPrecision(3));
  return m === 1 ? `10<sup>${e}</sup>` : `${m}×10<sup>${e}</sup>`;
}

function allSubs(r) { return [...r.reactants, ...r.products]; }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// 교사 페이지
// ══════════════════════════════════════════════

let editingId = null;
let substancesState = { reactants: [], products: [] };
let nextSubId = 200;

function render() {
  const list = document.getElementById('reaction-list');
  if (reactions.length === 0) {
    list.innerHTML = '<div class="empty-state">아직 반응이 없습니다. 아래 버튼으로 추가하세요.</div>';
    return;
  }
  list.innerHTML = reactions.map((r, i) => `
    <div class="reaction-card">
      <div class="reaction-card-body">
        <div class="reaction-index">${i+1}</div>
        <div class="reaction-info">
          <div class="reaction-equation">${buildEquationHtml(r)}</div>
          <div class="reaction-meta">온도: <strong>${r.temperature}°C</strong>&nbsp;·&nbsp;K = <strong>${formatKHtml(r.K)}</strong></div>
        </div>
        <div class="reaction-actions">
          <button class="btn-icon" onclick="openEditModal('${r.id}')" title="편집">✏️</button>
          <button class="btn-icon danger" onclick="confirmDelete('${r.id}')" title="삭제">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '반응 추가';
  document.getElementById('modal-delete-btn').classList.add('hidden');
  document.getElementById('input-temp').value = '';
  document.getElementById('input-k').value = '';
  substancesState = { reactants: [newSub()], products: [newSub()] };
  renderSubstances(); updatePreview();
  document.getElementById('modal-backdrop').classList.remove('hidden');
}

function openEditModal(id) {
  const r = reactions.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '반응 편집';
  document.getElementById('modal-delete-btn').classList.remove('hidden');
  document.getElementById('input-temp').value = r.temperature;
  document.getElementById('input-k').value = r.K;
  substancesState = { reactants: r.reactants.map(s=>({...s})), products: r.products.map(s=>({...s})) };
  renderSubstances(); updatePreview();
  document.getElementById('modal-backdrop').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-backdrop').classList.add('hidden'); }
function handleBackdropClick(e) { if (e.target === document.getElementById('modal-backdrop')) closeModal(); }

function newSub() { return { id:'s'+(nextSubId++), formula:'', coefficient:1, state:'g', fixedConc:null }; }

function addSubstance(side) { syncDOM(); substancesState[side].push(newSub()); renderSubstances(); }

function removeSubstance(side, id) {
  syncDOM();
  substancesState[side] = substancesState[side].filter(s => s.id !== id);
  renderSubstances(); updatePreview();
}

function renderSubstances() {
  ['reactants','products'].forEach(side => {
    document.getElementById(`${side}-container`).innerHTML =
      substancesState[side].map(s => buildSubRow(side, s)).join('');
  });
}

function buildSubRow(side, s) {
  const showFixed = s.state==='l'||s.state==='s';
  const fixedVal = s.fixedConc ?? (s.state==='l' ? 55.5 : 1);
  const canDel = substancesState[side].length > 1;
  return `
    <div class="substance-row" data-id="${s.id}" data-side="${side}">
      <input type="number" class="form-input sub-coeff" value="${s.coefficient}" min="1" step="1"
             oninput="onField('${side}','${s.id}','coefficient',this.value)">
      <input type="text" class="form-input sub-formula" value="${s.formula}" placeholder="예: NO2"
             oninput="onField('${side}','${s.id}','formula',this.value)">
      <select class="form-select sub-state" onchange="onField('${side}','${s.id}','state',this.value)">
        <option value="g"  ${s.state==='g' ?'selected':''}>g</option>
        <option value="aq" ${s.state==='aq'?'selected':''}>aq</option>
        <option value="l"  ${s.state==='l' ?'selected':''}>l</option>
        <option value="s"  ${s.state==='s' ?'selected':''}>s</option>
      </select>
      ${showFixed
        ? `<input type="number" class="form-input sub-fixed" value="${fixedVal}" step="any" placeholder="M"
                  title="고정 농도 (M)" oninput="onField('${side}','${s.id}','fixedConc',this.value)">`
        : `<div style="width:78px;flex-shrink:0"></div>`}
      <button class="btn-icon danger" onclick="removeSubstance('${side}','${s.id}')"
              style="flex-shrink:0" ${canDel?'':'disabled'}>✕</button>
    </div>`;
}

function onField(side, id, field, value) {
  syncDOM();
  const s = substancesState[side].find(x=>x.id===id);
  if (!s) return;
  if (field==='coefficient') s.coefficient = Math.max(1, parseInt(value)||1);
  else if (field==='formula') s.formula = value;
  else if (field==='state') {
    s.state = value;
    s.fixedConc = (value==='l'||value==='s') ? (s.fixedConc ?? (value==='l'?55.5:1)) : null;
    renderSubstances();
  } else if (field==='fixedConc') s.fixedConc = parseFloat(value)||null;
  updatePreview();
}

function syncDOM() {
  ['reactants','products'].forEach(side => {
    document.getElementById(`${side}-container`).querySelectorAll('.substance-row').forEach(row => {
      const s = substancesState[side].find(x=>x.id===row.dataset.id);
      if (!s) return;
      const c=row.querySelector('.sub-coeff'), f=row.querySelector('.sub-formula'),
            st=row.querySelector('.sub-state'), fx=row.querySelector('.sub-fixed');
      if (c)  s.coefficient = Math.max(1,parseInt(c.value)||1);
      if (f)  s.formula = f.value;
      if (st) s.state = st.value;
      if (fx) s.fixedConc = parseFloat(fx.value)||null;
    });
  });
}

function updatePreview() {
  document.getElementById('eq-preview').innerHTML =
    buildEquationHtml({ reactants: substancesState.reactants, products: substancesState.products });
}

function saveReaction() {
  syncDOM();
  const temp = parseFloat(document.getElementById('input-temp').value);
  const K = parseFloat(document.getElementById('input-k').value.replace(/×/g,'*'));
  if (isNaN(temp)) { showToast('온도를 입력하세요'); return; }
  if (isNaN(K)||K<=0) { showToast('K 값을 올바르게 입력하세요 (양수)'); return; }
  if (substancesState.reactants.every(s=>!s.formula.trim())) { showToast('반응물을 입력하세요'); return; }
  if (substancesState.products.every(s=>!s.formula.trim())) { showToast('생성물을 입력하세요'); return; }
  const data = {
    temperature: temp, K,
    reactants: substancesState.reactants.filter(s=>s.formula.trim()),
    products:  substancesState.products.filter(s=>s.formula.trim())
  };
  if (editingId) {
    const idx = reactions.findIndex(r=>r.id===editingId);
    if (idx>=0) reactions[idx] = { id: editingId, ...data };
  } else {
    reactions.push({ id:'r'+Date.now(), ...data });
  }
  render(); closeModal();
  showToast(editingId ? '수정되었습니다' : '반응이 추가되었습니다');
}

function confirmDelete(id) {
  if (!confirm('이 반응을 삭제하시겠습니까?')) return;
  reactions = reactions.filter(r=>r.id!==id);
  render(); showToast('삭제되었습니다');
}

function deleteCurrentReaction() {
  if (!editingId) return;
  closeModal();
  reactions = reactions.filter(r=>r.id!==editingId);
  render(); showToast('삭제되었습니다');
}

function generateLink() {
  if (reactions.length===0) { showToast('반응을 먼저 추가하세요'); return; }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ reactions }))));
  const url = `${location.origin}${location.pathname}?data=${encoded}`;
  document.getElementById('link-text').textContent = url;
  document.getElementById('link-result').classList.remove('hidden');
}

function copyLink() {
  const text = document.getElementById('link-text').textContent;
  if (navigator.clipboard && location.protocol !== 'file:') {
    navigator.clipboard.writeText(text).then(()=>showToast('링크가 복사되었습니다')).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('링크가 복사되었습니다'); }
  catch { showToast('복사 실패 — 텍스트를 직접 선택해 복사하세요'); }
  document.body.removeChild(ta);
}

// ══════════════════════════════════════════════
// 학생 페이지
// ══════════════════════════════════════════════

let s_idx = 0;
let s_experiments = [];

function initStudentPage() {
  s_idx = 0; s_experiments = [];
  renderTabs(); loadReaction(0);
}

function renderTabs() {
  document.getElementById('s-tabs').innerHTML = reactions.map((r, i) => `
    <button class="tab-btn ${i===s_idx?'active':''}" onclick="loadReaction(${i})">반응 ${i+1}</button>
  `).join('');
}

function loadReaction(idx) {
  s_idx = idx; s_experiments = [];
  renderTabs();
  document.getElementById('s-equation').innerHTML = buildEquationHtml(reactions[idx]);
  renderStudentInputs();
  renderTable();
}

function renderStudentInputs() {
  const r = reactions[s_idx];
  const variable = allSubs(r).filter(s => s.state!=='l' && s.state!=='s');
  const fixed    = allSubs(r).filter(s => s.state==='l' || s.state==='s');

  let html = '';
  for (const s of variable) {
    html += `
      <div class="s-input-row">
        <span class="s-input-label">[${formatFormula(s.formula)}]₀</span>
        <input type="number" class="form-input" id="s-in-${s.id}"
               placeholder="0" min="0" step="any" inputmode="decimal">
        <span class="s-unit">M</span>
      </div>`;
  }
  if (fixed.length > 0) {
    html += `<p class="form-hint" style="margin-top:10px">`;
    html += fixed.map(s => `[${formatFormula(s.formula)}](${s.state}) = <strong>${s.fixedConc}&nbsp;M</strong> (일정)`).join('&emsp;');
    html += `</p>`;
  }
  document.getElementById('s-input-area').innerHTML = html;
}

function addExperiment() {
  const r = reactions[s_idx];
  const variable = allSubs(r).filter(s => s.state!=='l' && s.state!=='s');

  // 초기 농도 수집
  const initConcs = {};
  for (const s of allSubs(r)) {
    if (s.state==='l'||s.state==='s') {
      initConcs[s.id] = s.fixedConc;
    } else {
      const v = parseFloat(document.getElementById(`s-in-${s.id}`)?.value);
      initConcs[s.id] = isNaN(v) ? 0 : v;
    }
  }

  if (variable.every(s => initConcs[s.id] === 0)) {
    showToast('초기 농도를 하나 이상 입력하세요'); return;
  }
  if (variable.some(s => initConcs[s.id] < 0)) {
    showToast('농도는 0 이상이어야 합니다'); return;
  }

  let xi;
  try { xi = solveEquilibrium(r, initConcs); }
  catch(e) { showToast('평형 계산 실패: ' + e.message); return; }

  // 평형 농도 계산
  const eqConcs = {};
  for (const s of allSubs(r)) {
    if (s.state==='l'||s.state==='s') {
      eqConcs[s.id] = s.fixedConc;
    } else if (r.reactants.some(x=>x.id===s.id)) {
      eqConcs[s.id] = Math.max(0, initConcs[s.id] - s.coefficient * xi);
    } else {
      eqConcs[s.id] = Math.max(0, initConcs[s.id] + s.coefficient * xi);
    }
  }

  // 후보 식 계산
  const formulas = calcFormulas(r, eqConcs);
  s_experiments.push({ initConcs, eqConcs, formulas });
  renderTable();
}

function clearExperiments() { s_experiments = []; renderTable(); }

// ── 평형 풀이기 (이분법, log 스케일) ──

function solveEquilibrium(r, initConcs) {
  const varR = r.reactants.filter(s => s.state!=='l'&&s.state!=='s');
  const varP = r.products.filter(s => s.state!=='l'&&s.state!=='s');

  let xiMax = Infinity, xiMin = -Infinity;
  for (const s of varR) xiMax = Math.min(xiMax, (initConcs[s.id]||0) / s.coefficient);
  for (const s of varP) xiMin = Math.max(xiMin, -(initConcs[s.id]||0) / s.coefficient);

  const eps = 1e-12;
  xiMin += eps; xiMax -= eps;
  if (xiMin > xiMax) throw new Error('농도 범위 오류');

  const logK = Math.log(r.K);

  function logQ(xi) {
    let lq = 0;
    for (const s of varP) {
      const c = (initConcs[s.id]||0) + s.coefficient * xi;
      if (c <= 0) return Infinity;
      lq += s.coefficient * Math.log(c);
    }
    for (const s of varR) {
      const c = (initConcs[s.id]||0) - s.coefficient * xi;
      if (c <= 0) return -Infinity;
      lq -= s.coefficient * Math.log(c);
    }
    return lq;
  }

  const fMin = logQ(xiMin) - logK;
  const fMax = logQ(xiMax) - logK;

  // 부호가 같으면 가장 가까운 경계 반환
  if (fMin >= 0 && fMax >= 0) return xiMin;
  if (fMin <= 0 && fMax <= 0) return xiMax;

  let lo = fMin < 0 ? xiMin : xiMax;
  let hi = fMin < 0 ? xiMax : xiMin;

  for (let i = 0; i < 200; i++) {
    if (Math.abs(hi - lo) < 1e-13) break;
    const mid = (lo + hi) / 2;
    if (logQ(mid) - logK < 0) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

// ── 후보 식 열 정의 ──

function getFormulaCols(r) {
  const hasFixed = allSubs(r).some(s => s.state==='l'||s.state==='s');
  const fixedNames = allSubs(r).filter(s => s.state==='l'||s.state==='s').map(s => formatFormula(s.formula));

  if (!hasFixed) {
    return [
      { label: buildQHeader('ignore', r, false), type:'ignore', inc:false },
      { label: buildQHeader('mult',   r, false), type:'mult',   inc:false },
      { label: buildQHeader('exp',    r, false), type:'exp',    inc:false }
    ];
  } else {
    const fixedLabel = fixedNames.map(f=>`[${f}]`).join('');
    return [
      { label: buildQHeader('ignore', r, true),  type:'ignore', inc:true,  group:`${fixedLabel} 포함` },
      { label: buildQHeader('mult',   r, true),  type:'mult',   inc:true,  group:`${fixedLabel} 포함` },
      { label: buildQHeader('exp',    r, true),  type:'exp',    inc:true,  group:`${fixedLabel} 포함` },
      { label: buildQHeader('ignore', r, false), type:'ignore', inc:false, group:`${fixedLabel} 제외` },
      { label: buildQHeader('mult',   r, false), type:'mult',   inc:false, group:`${fixedLabel} 제외` },
      { label: buildQHeader('exp',    r, false), type:'exp',    inc:false, group:`${fixedLabel} 제외` }
    ];
  }
}

function buildQHeader(type, r, includeFixed) {
  const filter = arr => arr.filter(s => includeFixed || (s.state!=='l'&&s.state!=='s'));
  const prods  = filter(r.products);
  const reacts = filter(r.reactants);

  const term = (s) => {
    const f = formatFormula(s.formula);
    if (type==='ignore') return `[${f}]`;
    if (type==='mult') {
      const c = s.coefficient===1 ? '' : s.coefficient;
      return `${c}[${f}]`;
    }
    const e = s.coefficient===1 ? '' : `<sup>${s.coefficient}</sup>`;
    return `[${f}]${e}`;
  };

  const numStr = prods.map(term).join('·');
  const denStr = reacts.map(term).join('·');
  return `<span class="frac"><span class="fn">${numStr}</span><span class="fd">${denStr}</span></span>`;
}

function calcQValue(r, eqConcs, type, includeFixed) {
  const filter = arr => arr.filter(s => includeFixed || (s.state!=='l'&&s.state!=='s'));
  let num = 1, den = 1;
  for (const s of filter(r.products)) {
    const c = eqConcs[s.id];
    num *= type==='ignore' ? c : type==='mult' ? s.coefficient*c : Math.pow(c, s.coefficient);
  }
  for (const s of filter(r.reactants)) {
    const c = eqConcs[s.id];
    den *= type==='ignore' ? c : type==='mult' ? s.coefficient*c : Math.pow(c, s.coefficient);
  }
  return num / den;
}

function calcFormulas(r, eqConcs) {
  return getFormulaCols(r).map(col => calcQValue(r, eqConcs, col.type, col.inc));
}

// ── 결과 표 렌더링 ──

function renderTable() {
  const section = document.getElementById('s-results-section');
  if (s_experiments.length === 0) { section.style.display='none'; return; }
  section.style.display = '';

  const r = reactions[s_idx];
  const variable = allSubs(r).filter(s => s.state!=='l'&&s.state!=='s');
  const allS     = allSubs(r);
  const cols     = getFormulaCols(r);
  const hasFixed = allS.some(s => s.state==='l'||s.state==='s');
  const ROMAN    = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

  // ── 2행 헤더 구성 ──
  const nInit = variable.length;
  const nEq   = allS.length;
  const nForm = cols.length;

  // 후보 식 그룹 헤더 (hasFixed면 그룹 2개, 아니면 그룹 없음)
  let groupRow = '';
  if (hasFixed) {
    // [H₂O] 포함 3개, 제외 3개
    groupRow = `
      <tr>
        <th rowspan="2" style="background:var(--gray-100)">구분</th>
        <th colspan="${nInit}" style="background:var(--gray-100)">초기 농도 (M)</th>
        <th colspan="${nEq}"   style="background:var(--gray-100)">평형 농도 (M)</th>
        <th colspan="3" class="group-header">${cols[0].group}</th>
        <th colspan="3" class="group-header">${cols[3].group}</th>
      </tr>`;
  } else {
    groupRow = `
      <tr>
        <th rowspan="2" style="background:var(--gray-100)">구분</th>
        <th colspan="${nInit}" style="background:var(--gray-100)">초기 농도 (M)</th>
        <th colspan="${nEq}"   style="background:var(--gray-100)">평형 농도 (M)</th>
        <th colspan="${nForm}" style="background:var(--gray-100)">후보 식</th>
      </tr>`;
  }

  // 2행: 각 열의 개별 헤더
  let subRow = '<tr>';
  for (const s of variable) subRow += `<th>[${formatFormula(s.formula)}]</th>`;
  for (const s of allS) {
    const cls = (s.state==='l'||s.state==='s') ? ' style="color:var(--gray-500)"' : '';
    subRow += `<th${cls}>[${formatFormula(s.formula)}]<sub>eq</sub></th>`;
  }
  for (const col of cols) subRow += `<th>${col.label}</th>`;
  subRow += '</tr>';

  // ── 데이터 행 ──
  let tbody = '<tbody>';
  s_experiments.forEach((exp, i) => {
    tbody += `<tr><td class="label-cell">실험&nbsp;${ROMAN[i]||i+1}</td>`;
    for (const s of variable)
      tbody += `<td>${fmtConc(exp.initConcs[s.id])}</td>`;
    for (const s of allS) {
      const isF = s.state==='l'||s.state==='s';
      tbody += `<td class="${isF?'fixed-cell':''}">${fmtConc(exp.eqConcs[s.id])}${isF?' <small style="font-size:0.7em;color:var(--gray-400)">(일정)</small>':''}</td>`;
    }
    exp.formulas.forEach(v => tbody += `<td class="formula-cell">${fmtQ(v)}</td>`);
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  document.getElementById('s-table').innerHTML =
    `<thead>${groupRow}${subRow}</thead>${tbody}`;
}

// ── 수치 포맷 ──

function fmtConc(c) {
  if (c==null||isNaN(c)) return '—';
  if (c===0) return '0';
  if (Math.abs(c)<1e-9) return '≈0';
  const abs = Math.abs(c);
  if (abs>=0.0001) return c.toFixed(4);
  const e = Math.floor(Math.log10(abs));
  const m = parseFloat((c/Math.pow(10,e)).toPrecision(3));
  return `${m}×10<sup>${e}</sup>`;
}

function fmtQ(val) {
  if (!isFinite(val)||isNaN(val)) return '—';
  if (val===0) return '0';
  const abs = Math.abs(val);
  if (abs>=0.001&&abs<100000) return parseFloat(val.toPrecision(4)).toString();
  const e = Math.floor(Math.log10(abs));
  const m = parseFloat((val/Math.pow(10,e)).toPrecision(3));
  return `${m}×10<sup>${e}</sup>`;
}

function goTeacher() {
  location.href = location.pathname + '?teacher';
}

function previewStudent() {
  if (reactions.length === 0) { showToast('반응을 먼저 추가하세요'); return; }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ reactions }))));
  location.href = location.pathname + '?data=' + encoded;
}

// ══════════════════════════════════════════════
// 라우팅 — 초기화
// ══════════════════════════════════════════════

const urlParams = new URLSearchParams(location.search);
const encodedData = urlParams.get('data');
const isTeacher   = urlParams.has('teacher');

if (isTeacher) {
  // 교사 설정 화면 (?teacher)
  document.getElementById('teacher-page').classList.remove('hidden');
  render();
} else {
  // 학생 화면 — 기본 또는 커스텀 데이터
  if (encodedData) {
    try {
      const decoded = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
      reactions = decoded.reactions;
    } catch(e) {
      showToast('링크 데이터 오류 — 기본 반응으로 표시합니다');
    }
  }
  document.getElementById('student-page').classList.remove('hidden');
  initStudentPage();
}
